server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ calls to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:9090/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Pass Set-Cookie header through so JWT httpOnly cookies work
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 120s;
    }

    # Cache fingerprinted static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Allow large PPTX downloads
    client_max_body_size 50M;
}
