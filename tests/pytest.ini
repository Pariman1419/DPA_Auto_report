[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Pure unit tests (no DB, no HTTP)
    api: Tests using FastAPI TestClient with mocked DB
    integration: Tests requiring a real PostgreSQL connection
    regression: Regression tests tied to known bugs
    e2e: End-to-end tests using Playwright
    slow: Tests that take > 5 seconds
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
